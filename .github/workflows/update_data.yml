name: BCA Quarterly Update

on:
  schedule:
    # Run at 00:00 on the 1st day of every month to catch latest BEA/NIPA updates
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Important: use default GITHUB_TOKEN so we can push back to the repo
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run BCA Data Pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/build_quarterly_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bca_web/public/data/latest_quarter.json
          
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update BCA quarterly data (latest_quarter.json)"
            git push
          fi
